{% extends "base.html" %}

{% block title %}Manage Sites{% endblock %}

{% block content %}
<div class="mb-8 bg-white p-6 rounded-xl shadow-sm border border-gray-100">
    <h3 class="text-lg font-bold mb-4">Add New Site</h3>
    <form hx-post="/sites/create" hx-target="#site-list" hx-on::after-request="this.reset()" class="grid grid-cols-1 md:grid-cols-4 gap-4">
        <div>
            <label class="block text-sm font-medium text-gray-700">Domain</label>
            <input type="text" name="domain" placeholder="example.com" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm p-2 border">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700">CMS</label>
            <input type="text" name="cms" placeholder="WordPress" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm p-2 border">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700">Region</label>
            <input type="text" name="region" placeholder="US/Global" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm p-2 border">
        </div>
        <div class="flex items-end">
            <button type="submit" class="w-full bg-indigo-600 text-white p-2 rounded-md hover:bg-indigo-700 transition">
                Add Site
            </button>
        </div>
    </form>
</div>

<div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
    <table class="w-full text-left">
        <thead class="bg-gray-50 text-xs font-semibold uppercase text-gray-400">
            <tr>
                <th class="px-6 py-4">Domain</th>
                <th class="px-6 py-4">CMS</th>
                <th class="px-6 py-4">Region</th>
                <th class="px-6 py-4 text-right">Actions</th>
            </tr>
        </thead>
        <tbody id="site-list" class="divide-y divide-gray-100">
            {% include "sites/partials/site_list_items.html" %}
        </tbody>
    </table>
</div>
{% endblock %}
