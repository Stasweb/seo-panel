<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SEO Panel — Заметки</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 text-gray-900">
  <div class="min-h-screen flex flex-col">
    <header class="bg-white border-b">
      <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
        <div class="font-bold text-lg">SEO Panel</div>
        <nav class="flex gap-4 text-sm items-center">
          <a class="text-gray-600 hover:text-gray-900" href="/">Дашборд</a>
          <a class="text-gray-600 hover:text-gray-900" href="/sites">Сайты</a>
          <a class="text-gray-600 hover:text-gray-900" href="/links">Ссылки</a>
          <a class="text-gray-600 hover:text-gray-900" href="/users">Пользователи</a>
          <a class="text-gray-600 hover:text-gray-900" href="/keywords">Ключевые слова</a>
          <a class="text-gray-600 hover:text-gray-900" href="/competitors">Конкуренты</a>
          <a class="text-gray-600 hover:text-gray-900" href="/logs">Логи</a>
          <a class="text-indigo-700 font-medium" href="/notes">Заметки</a>
          <button id="notif-btn" class="text-gray-700 hover:text-gray-900 text-sm"
            onclick="toggleNotifications()">🔔<span id="notif-count"
              class="ml-1 text-xs text-white bg-rose-600 rounded px-1 hidden">0</span></button>
          <div id="notif-menu"
            class="hidden absolute right-6 top-14 w-96 bg-white border rounded-lg shadow-lg overflow-hidden z-50">
            <div class="px-4 py-2 text-xs uppercase text-gray-400 bg-gray-50">События</div>
            <div id="notif-items" class="max-h-80 overflow-y-auto"></div>
          </div>
          <a class="text-gray-600 hover:text-gray-900" href="/logout">Выйти</a>
        </nav>
      </div>
    </header>

    <main class="flex-1">
      <div class="max-w-6xl mx-auto px-6 py-8 space-y-8">
        <section class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
          <div class="flex items-center justify-between mb-4">
            <h2 class="text-lg font-bold">Заметки</h2>
            <div class="flex gap-3 items-center">
              <select id="notes-status-filter" class="rounded-md border-gray-300 text-sm p-2 border"
                onchange="loadNotes()">
                <option value="">Все</option>
                <option value="todo">К выполнению</option>
                <option value="in_progress">В работе</option>
                <option value="done">Завершено</option>
              </select>
              <button class="text-sm text-indigo-700 hover:underline" onclick="loadNotes()">Обновить</button>
            </div>
          </div>

          <form class="grid grid-cols-1 md:grid-cols-4 gap-4" onsubmit="event.preventDefault(); createNoteFromForm();">
            <div class="md:col-span-2">
              <label class="block text-sm font-medium text-gray-700">Заголовок</label>
              <input id="note-title" type="text" required
                class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm p-2 border" />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700">Статус</label>
              <select id="note-status" class="mt-1 block w-full rounded-md border-gray-300 text-sm p-2 border">
                <option value="todo">К выполнению</option>
                <option value="in_progress">В работе</option>
                <option value="done">Завершено</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700">Цвет</label>
              <select id="note-color" class="mt-1 block w-full rounded-md border-gray-300 text-sm p-2 border">
                <option value="gray">Серый</option>
                <option value="yellow">Жёлтый</option>
                <option value="green">Зелёный</option>
                <option value="red">Красный</option>
              </select>
            </div>
            <div class="flex items-end">
              <button type="submit"
                class="w-full bg-indigo-600 text-white p-2 rounded-md hover:bg-indigo-700 transition">
                Добавить
              </button>
            </div>
            <div class="md:col-span-4">
              <label class="block text-sm font-medium text-gray-700">Контент</label>
              <textarea id="note-content" rows="4"
                class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm p-2 border"></textarea>
            </div>
          </form>

          <div id="notes-result" class="mt-4 text-sm text-gray-600"></div>
        </section>

        <section class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
          <table class="w-full text-left">
            <thead class="bg-gray-50 text-xs font-semibold uppercase text-gray-400">
              <tr>
                <th class="px-6 py-4">Заголовок</th>
                <th class="px-6 py-4">Статус</th>
                <th class="px-6 py-4">Цвет</th>
                <th class="px-6 py-4">Создано</th>
                <th class="px-6 py-4 text-right">Действия</th>
              </tr>
            </thead>
            <tbody id="notes-body" class="divide-y divide-gray-100">
              <tr>
                <td colspan="5" class="px-6 py-10 text-center text-gray-400">Загрузка…</td>
              </tr>
            </tbody>
          </table>
        </section>
      </div>
    </main>

    <footer class="bg-white border-t">
      <div class="max-w-6xl mx-auto px-6 py-4 text-center text-gray-500 text-sm">
        SEO Panel
      </div>
    </footer>
  </div>

  <script src="/static/js/app.js"></script>
</body>

</html>
