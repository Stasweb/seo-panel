<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ settings.APP_NAME }} - SEO Dashboard</title>
    <!-- Tailwind CSS for lightweight styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- HTMX for reactive interactions -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <!-- Chart.js for charts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: block; }
        .htmx-request.htmx-indicator { display: block; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">
    <div class="min-h-screen flex flex-col">
        <!-- Sidebar and Main Content Wrapper -->
        <div class="flex flex-1">
            <!-- Sidebar -->
            <aside class="w-64 bg-indigo-900 text-white p-6 hidden md:block">
                <h1 class="text-2xl font-bold mb-10 flex items-center">
                    <span class="mr-2">📈</span> SEO Studio
                </h1>
                <nav class="space-y-4">
                    <a href="/" class="block hover:bg-indigo-800 p-2 rounded transition">Dashboard</a>
                    <a href="/sites" class="block hover:bg-indigo-800 p-2 rounded transition">Sites</a>
                    <a href="/seo/tools" class="block hover:bg-indigo-800 p-2 rounded transition">SEO Tools</a>
                </nav>
            </aside>

            <!-- Main Content -->
            <main class="flex-1 p-8 overflow-y-auto">
                <!-- Header -->
                <header class="mb-8 flex justify-between items-center">
                    <h2 class="text-3xl font-semibold">{% block title %}{% endblock %}</h2>
                    <div class="flex items-center space-x-4">
                        <span class="text-sm text-gray-500">v1.0.0</span>
                    </div>
                </header>

                <!-- Content Area -->
                <div id="content">
                    {% block content %}{% endblock %}
                </div>
            </main>
        </div>
        
        <!-- Footer -->
        <footer class="bg-white border-t p-4 text-center text-gray-500 text-sm">
            © 2024 SEO Studio - Lightweight SEO Management
        </footer>
    </div>

    <!-- Scripts -->
    <script src="/static/js/app.js"></script>
</body>
</html>
