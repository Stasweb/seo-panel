{% extends "base.html" %}

{% block title %}SEO Tools{% endblock %}

{% block content %}
<div class="grid grid-cols-1 md:grid-cols-2 gap-8">
    <!-- Keyword Density Tool -->
    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
        <h3 class="text-lg font-bold mb-4">Keyword Density Analyzer</h3>
        <p class="text-sm text-gray-500 mb-4">Paste your text to see word frequency (excluding common stop words).</p>
        <form hx-post="/seo/tools/density" hx-target="#density-result" class="space-y-4">
            <textarea name="text" rows="8" placeholder="Paste your article or page content here..." 
                      class="w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm p-3 border"></textarea>
            <button type="submit" class="w-full bg-indigo-600 text-white p-2 rounded-md hover:bg-indigo-700 transition">
                Analyze Density
            </button>
        </form>
        <div id="density-result" class="mt-6">
            <!-- Results will be swapped here -->
        </div>
    </div>

    <!-- Meta Description Generator -->
    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 h-fit">
        <h3 class="text-lg font-bold mb-4">Meta Description Generator</h3>
        <p class="text-sm text-gray-500 mb-4">Generate a search-friendly meta description from your content.</p>
        <form hx-post="/seo/tools/meta-gen" hx-target="#meta-result" class="space-y-4">
            <textarea name="content" rows="6" placeholder="Enter content to summarize..." 
                      class="w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm p-3 border"></textarea>
            <button type="submit" class="w-full bg-indigo-600 text-white p-2 rounded-md hover:bg-indigo-700 transition">
                Generate Meta
            </button>
        </form>
        <div id="meta-result" class="mt-6">
            <!-- Results will be swapped here -->
        </div>
    </div>
</div>
{% endblock %}
