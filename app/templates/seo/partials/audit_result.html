<div class="bg-gray-50 p-4 rounded-lg border border-gray-200 text-sm space-y-2">
    <div class="flex justify-between">
        <span class="text-gray-500">Status:</span>
        <span class="font-bold {% if result.status_code == 200 %}text-green-600{% else %}text-red-600{% endif %}">
            {{ result.status_code or 'Error' }}
        </span>
    </div>
    <div class="space-y-1">
        <span class="text-gray-500 block">Title ({{ result.title_length }} chars):</span>
        <span class="font-medium break-all">{{ result.title or 'N/A' }}</span>
    </div>
    <div class="space-y-1">
        <span class="text-gray-500 block">H1:</span>
        <span class="font-medium break-all">{{ result.h1 or 'N/A' }}</span>
    </div>
    <div class="flex justify-between">
        <span class="text-gray-500">Indexed:</span>
        <span class="font-medium">{{ 'Yes' if result.is_indexed else 'No' }}</span>
    </div>
</div>
