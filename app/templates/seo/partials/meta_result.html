<div class="bg-gray-50 p-4 rounded-lg border border-gray-200">
    <div class="flex justify-between items-center mb-2">
        <span class="text-xs font-semibold text-gray-400 uppercase">Generated Meta</span>
        <button onclick="navigator.clipboard.writeText('{{ meta }}')" class="text-xs text-indigo-600 hover:underline">Copy</button>
    </div>
    <p class="text-sm text-gray-800 italic">{{ meta or 'Could not generate.' }}</p>
    <div class="mt-2 text-right">
        <span class="text-xs text-gray-400">{{ meta|length }} / 160 characters</span>
    </div>
</div>
