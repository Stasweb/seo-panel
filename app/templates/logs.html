<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SEO Panel — Логи</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 text-gray-900">
  <div class="min-h-screen flex flex-col">
    <header class="bg-white border-b">
      <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
        <div class="font-bold text-lg">SEO Panel</div>
        <nav class="flex gap-4 text-sm items-center">
          <a class="text-gray-600 hover:text-gray-900" href="/">Дашборд</a>
          <a class="text-gray-600 hover:text-gray-900" href="/sites">Сайты</a>
          <a class="text-gray-600 hover:text-gray-900" href="/links">Ссылки</a>
          <a class="text-gray-600 hover:text-gray-900" href="/keywords">Ключевые слова</a>
          <a class="text-gray-600 hover:text-gray-900" href="/competitors">Конкуренты</a>
          <a class="text-indigo-700 font-medium" href="/logs">Логи</a>
          <a class="text-gray-600 hover:text-gray-900" href="/notes">Заметки</a>
          <button id="notif-btn" class="text-gray-700 hover:text-gray-900 text-sm"
            onclick="toggleNotifications()">🔔<span id="notif-count"
              class="ml-1 text-xs text-white bg-rose-600 rounded px-1 hidden">0</span></button>
          <div id="notif-menu"
            class="hidden absolute right-6 top-14 w-96 bg-white border rounded-lg shadow-lg overflow-hidden z-50">
            <div class="px-4 py-2 text-xs uppercase text-gray-400 bg-gray-50">События</div>
            <div id="notif-items" class="max-h-80 overflow-y-auto"></div>
          </div>
          <a class="text-gray-600 hover:text-gray-900" href="/logout">Выйти</a>
        </nav>
      </div>
    </header>

    <main class="flex-1">
      <div class="max-w-6xl mx-auto px-6 py-8 space-y-8">
        <section class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
          <div class="flex flex-wrap gap-3 items-end">
            <div>
              <label class="block text-sm font-medium text-gray-700">Уровень</label>
              <select id="logs-level" class="mt-1 rounded-md border-gray-300 text-sm p-2 border">
                <option value="">Все</option>
                <option value="INFO">INFO</option>
                <option value="WARNING">WARNING</option>
                <option value="ERROR">ERROR</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700">Категория</label>
              <select id="logs-category" class="mt-1 rounded-md border-gray-300 text-sm p-2 border">
                <option value="">Все</option>
                <option value="http">http</option>
                <option value="error">error</option>
                <option value="scan">scan</option>
                <option value="audit">audit</option>
                <option value="import">import</option>
                <option value="links">links</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700">Период (часы)</label>
              <input id="logs-hours" type="number" value="24" min="1"
                class="mt-1 rounded-md border-gray-300 text-sm p-2 border w-24" />
            </div>
            <button class="bg-indigo-600 text-white px-4 py-2 rounded-md hover:bg-indigo-700 transition text-sm"
              onclick="loadLogs()">Обновить</button>
            <button
              class="bg-white border border-gray-300 text-gray-800 px-4 py-2 rounded-md hover:bg-gray-50 transition text-sm"
              onclick="showLastErrors1h()">
              Ошибки 1ч
            </button>
            <button
              class="bg-white border border-gray-300 text-gray-800 px-4 py-2 rounded-md hover:bg-gray-50 transition text-sm"
              onclick="resetLogsFilters()">
              Сброс
            </button>
            <button
              class="bg-white border border-gray-300 text-gray-800 px-4 py-2 rounded-md hover:bg-gray-50 transition text-sm"
              onclick="cleanupLogs('1h')">Очистить >1ч</button>
            <button
              class="bg-white border border-gray-300 text-gray-800 px-4 py-2 rounded-md hover:bg-gray-50 transition text-sm"
              onclick="cleanupLogs('1d')">Очистить >1д</button>
            <button class="bg-red-600 text-white px-4 py-2 rounded-md hover:bg-red-700 transition text-sm"
              onclick="cleanupLogs('all')">Очистить всё</button>
          </div>
          <div id="logs-result" class="mt-3 text-sm text-gray-600"></div>
        </section>

        <section class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
          <table class="w-full text-left">
            <thead class="bg-gray-50 text-xs font-semibold uppercase text-gray-400">
              <tr>
                <th class="px-6 py-4">Время</th>
                <th class="px-6 py-4">Уровень</th>
                <th class="px-6 py-4">Категория</th>
                <th class="px-6 py-4">Метод</th>
                <th class="px-6 py-4">Путь</th>
                <th class="px-6 py-4">Статус</th>
                <th class="px-6 py-4">Сообщение</th>
              </tr>
            </thead>
            <tbody id="logs-body" class="divide-y divide-gray-100">
              <tr>
                <td colspan="7" class="px-6 py-10 text-center text-gray-400">Загрузка…</td>
              </tr>
            </tbody>
          </table>
        </section>
      </div>
    </main>

    <footer class="bg-white border-t">
      <div class="max-w-6xl mx-auto px-6 py-4 text-center text-gray-500 text-sm">SEO Panel</div>
    </footer>
  </div>
  <script src="/static/js/app.js"></script>
</body>

</html>
