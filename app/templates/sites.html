<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SEO Panel — Sites</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <script src="https://unpkg.com/htmx.org@1.9.10/dist/ext/json-enc.js"></script>
</head>
<body class="bg-gray-50 text-gray-900">
  <div class="min-h-screen flex flex-col">
    <header class="bg-white border-b">
      <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
        <div class="font-bold text-lg">SEO Panel</div>
        <nav class="flex gap-4 text-sm">
          <a class="text-gray-600 hover:text-gray-900" href="/">Dashboard</a>
          <a class="text-indigo-700 font-medium" href="/sites">Sites</a>
          <a class="text-gray-600 hover:text-gray-900" href="/logout">Logout</a>
        </nav>
      </div>
    </header>

    <main class="flex-1">
      <div class="max-w-6xl mx-auto px-6 py-8 space-y-8">
        <div
          id="sites-loader"
          hx-get="/api/sites"
          hx-trigger="load"
          hx-swap="none"
          data-render="sites"
        ></div>

        <section class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
          <h2 class="text-lg font-bold mb-4">Add site</h2>
          <form
            id="site-create-form"
            hx-ext="json-enc"
            hx-post="/api/sites"
            hx-swap="none"
            data-render="siteCreated"
            class="grid grid-cols-1 md:grid-cols-4 gap-4"
          >
            <div>
              <label class="block text-sm font-medium text-gray-700">Domain</label>
              <input
                type="text"
                name="domain"
                placeholder="example.com"
                required
                class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm p-2 border"
              />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700">CMS</label>
              <input
                type="text"
                name="cms"
                placeholder="WordPress"
                class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm p-2 border"
              />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700">Region</label>
              <input
                type="text"
                name="region"
                placeholder="RU / Global"
                class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm p-2 border"
              />
            </div>
            <div class="flex items-end">
              <button
                type="submit"
                class="w-full bg-indigo-600 text-white p-2 rounded-md hover:bg-indigo-700 transition"
              >
                Add
              </button>
            </div>
          </form>
          <div id="site-create-error" class="mt-4 text-sm text-red-600"></div>
        </section>

        <section class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
          <div class="px-6 py-4 flex items-center justify-between">
            <h2 class="text-lg font-bold">Sites</h2>
            <button
              class="text-sm text-indigo-700 hover:underline"
              onclick="window.location.reload()"
            >
              Refresh
            </button>
          </div>
          <table class="w-full text-left">
            <thead class="bg-gray-50 text-xs font-semibold uppercase text-gray-400">
              <tr>
                <th class="px-6 py-4">Domain</th>
                <th class="px-6 py-4">CMS</th>
                <th class="px-6 py-4">Region</th>
                <th class="px-6 py-4 text-right">Actions</th>
              </tr>
            </thead>
            <tbody id="sites-body" class="divide-y divide-gray-100">
              <tr>
                <td colspan="4" class="px-6 py-10 text-center text-gray-400">Loading…</td>
              </tr>
            </tbody>
          </table>
        </section>
      </div>
    </main>

    <footer class="bg-white border-t">
      <div class="max-w-6xl mx-auto px-6 py-4 text-center text-gray-500 text-sm">
        SEO Panel
      </div>
    </footer>
  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
